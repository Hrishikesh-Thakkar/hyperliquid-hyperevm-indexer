services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/hl-indexer
      HYPEREVM_RPC_URL: ${HYPEREVM_RPC_URL:-https://hyperliquid.drpc.org}
      HL_API_URL: ${HL_API_URL:-https://api.hyperliquid.xyz/info}
      API_PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WALLETS: ${WALLETS:-0x30d83d444E230F652e2c62cb5697C8DaD503987b,0x4F0A01BAdAa24F762CeE620883f16C4460c06Be0,0xFaCC5b022641e9905bA3bac29b26E6d6191f2B8B,0x97e7d0c24d485aa07e8218528f8dfcd00ac63f75}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-30000}
      MATCHER_INTERVAL_MS: ${MATCHER_INTERVAL_MS:-30000}
      EVM_SEARCH_WINDOW_MS: ${EVM_SEARCH_WINDOW_MS:-600000}
      MAX_RETRIES: ${MAX_RETRIES:-5}
      RETRY_DELAY_MS: ${RETRY_DELAY_MS:-120000}
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
